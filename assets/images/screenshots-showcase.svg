    <!-- Phone frame with glow -->
    <rect x="0" y="0" width="140" height="280" rx="20" style="fill:none;stroke:#7C3AED;stroke-width:2;filter:url(#violetGlow)" />
    <!-- Screen background -->
    <rect x="6" y="6" width="128" height="268" rx="16" style="fill:url(#screenGrad1)" />

