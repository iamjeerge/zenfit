    <text x="95" y="123" style="font-family:Arial,sans-serif;font-size:8px;fill:#FFFFFF;text-anchor:middle;font-weight:bold">72g</text>
    <text x="95" y="133" style="font-family:Arial,sans-serif;font-size:7px;fill:#C4B5FD;text-anchor:middle">Protein</text>

