<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- Violet glow filter -->
    <filter id="violetGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Screen gradients for each mockup -->
    <linearGradient id="screenGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1628" />
      <stop offset="100%" style="stop-color:#0D0B1A" />
    </linearGradient>
    <linearGradient id="screenGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1628" />
      <stop offset="100%" style="stop-color:#0D0B1A" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="600" style="fill:#0D0B1A" />

  <!-- "Beautiful Cosmic UI" tagline -->
  <text x="600" y="45" style="font-family:Arial,sans-serif;font-size:32px;font-weight:bold;fill:#FFFFFF;text-anchor:middle">Beautiful Cosmic UI</text>

  <!-- Phone frames arranged in a slight arc/fan -->

  <!-- Frame 1: Home -->
  <g transform="translate(120, 180) rotate(-12)">
    <!-- Phone frame with glow -->
    <rect x="0" y="0" width="140" height="280" rx="20" style="fill:none;stroke:#7C3AED;stroke-width:2;filter:url(#violetGlow)" />
    <!-- Screen background -->
    <rect x="6" y="6" width="128" height="268" rx="16" style="fill:url(#screenGrad1)" />

    <!-- Home screen content -->
    <!-- Status bar -->
    <rect x="6" y="6" width="128" height="30" style="fill:#1a1628" />
    <text x="70" y="24" style="font-family:Arial,sans-serif;font-size:10px;fill:#C4B5FD;text-anchor:middle">9:41</text>

    <!-- Title -->
    <text x="70" y="50" style="font-family:Arial,sans-serif;font-size:12px;font-weight:bold;fill:#FFFFFF;text-anchor:middle">Welcome Back</text>

    <!-- Circular stats rings -->
    <circle cx="50" cy="100" r="20" style="fill:none;stroke:#7C3AED;stroke-width:2;opacity:0.5" />
    <circle cx="50" cy="100" r="20" style="fill:none;stroke:#F472B6;stroke-width:3;stroke-dasharray:80 120;opacity:0.8" />
    <text x="50" y="103" style="font-family:Arial,sans-serif;font-size:9px;fill:#FBBF24;text-anchor:middle;font-weight:bold">65%</text>

    <circle cx="90" cy="100" r="20" style="fill:none;stroke:#34D399;stroke-width:2;opacity:0.5" />
    <circle cx="90" cy="100" r="20" style="fill:none;stroke:#FBBF24;stroke-width:3;stroke-dasharray:100 120;opacity:0.8" />
    <text x="90" y="103" style="font-family:Arial,sans-serif;font-size:9px;fill:#34D399;text-anchor:middle;font-weight:bold">82%</text>

    <!-- Menu items -->
    <rect x="12" y="140" width="116" height="8" rx="2" style="fill:#7C3AED;opacity:0.6" />
    <rect x="12" y="155" width="116" height="8" rx="2" style="fill:#F472B6;opacity:0.5" />
    <rect x="12" y="170" width="116" height="8" rx="2" style="fill:#34D399;opacity:0.5" />
    <rect x="12" y="185" width="116" height="8" rx="2" style="fill:#C4B5FD;opacity:0.4" />
    <rect x="12" y="200" width="116" height="8" rx="2" style="fill:#7C3AED;opacity:0.5" />

