    <circle cx="70" cy="130" r="28" style="fill:none;stroke:#F472B6;stroke-width:2;opacity:0.6" />
    <circle cx="70" cy="130" r="22" style="fill:none;stroke:#7C3AED;stroke-width:2;opacity:0.8" />

