<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Aurora gradient for lotus -->
    <linearGradient id="logoAuroraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>

    <!-- Radial gradient for depth -->
    <radialGradient id="logoRadialGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Dark background (optional, can be transparent) -->
  <rect width="200" height="200" style="fill:#0D0B1A;opacity:0" />

  <!-- Lotus flower centered -->
  <g transform="translate(100, 100)">
    <!-- Outer petals (6) -->
    <ellipse cx="0" cy="-32" rx="14" ry="24" style="fill:url(#logoAuroraGradient);opacity:0.95" transform="rotate(0)" />
    <ellipse cx="0" cy="-32" rx="14" ry="24" style="fill:url(#logoAuroraGradient);opacity:0.9" transform="rotate(60)" />
    <ellipse cx="0" cy="-32" rx="14" ry="24" style="fill:url(#logoAuroraGradient);opacity:0.95" transform="rotate(120)" />
    <ellipse cx="0" cy="-32" rx="14" ry="24" style="fill:url(#logoAuroraGradient);opacity:0.9" transform="rotate(180)" />
    <ellipse cx="0" cy="-32" rx="14" ry="24" style="fill:url(#logoAuroraGradient);opacity:0.95" transform="rotate(240)" />
    <ellipse cx="0" cy="-32" rx="14" ry="24" style="fill:url(#logoAuroraGradient);opacity:0.9" transform="rotate(300)" />

    <!-- Middle petals (6) -->
    <ellipse cx="0" cy="-20" rx="11" ry="18" style="fill:#F472B6;opacity:1" transform="rotate(30)" />
    <ellipse cx="0" cy="-20" rx="11" ry="18" style="fill:#C4B5FD;opacity:0.95" transform="rotate(90)" />
    <ellipse cx="0" cy="-20" rx="11" ry="18" style="fill:#F472B6;opacity:1" transform="rotate(150)" />
    <ellipse cx="0" cy="-20" rx="11" ry="18" style="fill:#C4B5FD;opacity:0.95" transform="rotate(210)" />
    <ellipse cx="0" cy="-20" rx="11" ry="18" style="fill:#F472B6;opacity:1" transform="rotate(270)" />
    <ellipse cx="0" cy="-20" rx="11" ry="18" style="fill:#C4B5FD;opacity:0.95" transform="rotate(330)" />

    <!-- Inner petals (6) - smaller -->
    <ellipse cx="0" cy="-12" rx="9" ry="14" style="fill:url(#logoRadialGradient);opacity:0.9" transform="rotate(15)" />
    <ellipse cx="0" cy="-12" rx="9" ry="14" style="fill:url(#logoRadialGradient);opacity:0.9" transform="rotate(75)" />
    <ellipse cx="0" cy="-12" rx="9" ry="14" style="fill:url(#logoRadialGradient);opacity:0.9" transform="rotate(135)" />
    <ellipse cx="0" cy="-12" rx="9" ry="14" style="fill:url(#logoRadialGradient);opacity:0.9" transform="rotate(195)" />
    <ellipse cx="0" cy="-12" rx="9" ry="14" style="fill:url(#logoRadialGradient);opacity:0.9" transform="rotate(255)" />
    <ellipse cx="0" cy="-12" rx="9" ry="14" style="fill:url(#logoRadialGradient);opacity:0.9" transform="rotate(315)" />

    <!-- Center stamen -->
    <circle cx="0" cy="0" r="12" style="fill:#FBBF24" />
    <circle cx="0" cy="0" r="8" style="fill:#FCD34D;opacity:0.8" />
    <circle cx="0" cy="0" r="4" style="fill:#FFFFFF;opacity:0.6" />
  </g>
</svg>
