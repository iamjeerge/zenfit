<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Aurora gradient for wave -->
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#C4B5FD;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:0.4" />
    </linearGradient>

    <!-- Lotus flower gradient -->
    <radialGradient id="lotusGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Deep cosmic background -->
  <rect width="1200" height="400" style="fill:#0D0B1A" />

  <!-- Subtle star dots scattered in background -->
  <circle cx="100" cy="50" r="1.5" style="fill:#C4B5FD;opacity:0.3" />
  <circle cx="180" cy="80" r="1" style="fill:#FBBF24;opacity:0.4" />
  <circle cx="250" cy="40" r="1.2" style="fill:#34D399;opacity:0.3" />
  <circle cx="350" cy="60" r="1" style="fill:#C4B5FD;opacity:0.35" />
  <circle cx="450" cy="45" r="1.5" style="fill:#F472B6;opacity:0.3" />
  <circle cx="550" cy="70" r="1" style="fill:#7C3AED;opacity:0.4" />
  <circle cx="680" cy="55" r="1.2" style="fill:#C4B5FD;opacity:0.35" />
  <circle cx="800" cy="75" r="1" style="fill:#FBBF24;opacity:0.3" />
  <circle cx="900" cy="50" r="1.5" style="fill:#34D399;opacity:0.4" />
  <circle cx="1000" cy="65" r="1" style="fill:#F472B6;opacity:0.35" />
  <circle cx="1100" cy="45" r="1.2" style="fill:#C4B5FD;opacity:0.3" />

  <circle cx="120" cy="320" r="1" style="fill:#7C3AED;opacity:0.35" />
  <circle cx="280" cy="350" r="1.5" style="fill:#C4B5FD;opacity:0.3" />
  <circle cx="420" cy="330" r="1.2" style="fill:#F472B6;opacity:0.35" />
  <circle cx="600" cy="360" r="1" style="fill:#FBBF24;opacity:0.4" />
  <circle cx="750" cy="340" r="1.2" style="fill:#34D399;opacity:0.3" />
  <circle cx="920" cy="355" r="1" style="fill:#7C3AED;opacity:0.35" />
  <circle cx="1050" cy="330" r="1.5" style="fill:#C4B5FD;opacity:0.3" />

  <!-- Aurora wave -->
  <path d="M 0 180 Q 150 80, 300 120 T 600 140 T 900 110 T 1200 160 L 1200 280 Q 1050 320, 900 300 T 600 280 T 300 300 T 0 280 Z" style="fill:url(#auroraGradient)" />

  <!-- Lotus flower (center-left) -->
  <g transform="translate(220, 200)">
    <!-- Outer petals -->
    <ellipse cx="0" cy="-28" rx="12" ry="20" style="fill:url(#lotusGradient);opacity:0.9" transform="rotate(0)" />
    <ellipse cx="0" cy="-28" rx="12" ry="20" style="fill:url(#lotusGradient);opacity:0.85" transform="rotate(60)" />
    <ellipse cx="0" cy="-28" rx="12" ry="20" style="fill:url(#lotusGradient);opacity:0.8" transform="rotate(120)" />
    <ellipse cx="0" cy="-28" rx="12" ry="20" style="fill:url(#lotusGradient);opacity:0.85" transform="rotate(180)" />
    <ellipse cx="0" cy="-28" rx="12" ry="20" style="fill:url(#lotusGradient);opacity:0.9" transform="rotate(240)" />
    <ellipse cx="0" cy="-28" rx="12" ry="20" style="fill:url(#lotusGradient);opacity:0.85" transform="rotate(300)" />

    <!-- Middle petals -->
    <ellipse cx="0" cy="-18" rx="10" ry="16" style="fill:#F472B6;opacity:0.95" transform="rotate(30)" />
    <ellipse cx="0" cy="-18" rx="10" ry="16" style="fill:#F472B6;opacity:0.9" transform="rotate(90)" />
    <ellipse cx="0" cy="-18" rx="10" ry="16" style="fill:#F472B6;opacity:0.95" transform="rotate(150)" />
    <ellipse cx="0" cy="-18" rx="10" ry="16" style="fill:#F472B6;opacity:0.9" transform="rotate(210)" />
    <ellipse cx="0" cy="-18" rx="10" ry="16" style="fill:#F472B6;opacity:0.95" transform="rotate(270)" />
    <ellipse cx="0" cy="-18" rx="10" ry="16" style="fill:#F472B6;opacity:0.9" transform="rotate(330)" />

    <!-- Center -->
    <circle cx="0" cy="0" r="10" style="fill:#FBBF24" />
    <circle cx="0" cy="0" r="6" style="fill:#FCD34D" opacity="0.7" />
  </g>

  <!-- "ZenFit" text -->
  <text x="620" y="150" style="font-family:Arial,sans-serif;font-size:72px;font-weight:bold;fill:#FFFFFF;letter-spacing:2px">ZenFit</text>

  <!-- "Mind · Body · Soul" subtitle -->
  <text x="620" y="210" style="font-family:Arial,sans-serif;font-size:24px;fill:#C4B5FD;opacity:0.8;letter-spacing:4px">Mind · Body · Soul</text>
</svg>
